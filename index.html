<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kék Ló – Beléptető</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a4a7a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    header { color: white; text-align: center; margin-bottom: 20px; }
    header h1 { font-size: 22px; }
    header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .card { background: white; border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; margin-bottom: 16px; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; }
    .result { display: none; padding: 20px; border-radius: 10px; text-align: center; font-size: 22px; font-weight: bold; margin-top: 16px; width: 100%; max-width: 400px; }
    .result.ok { background: #d4edda; color: #155724; }
    .result.bad { background: #f8d7da; color: #721c24; }
    .result small { display: block; font-size: 15px; margin-top: 8px; font-weight: normal; }
    .btn { display: block; width: 100%; max-width: 400px; padding: 14px; background: white; color: #1a4a7a; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; }
    .status { color: white; font-size: 13px; margin-top: 8px; opacity: 0.8; text-align: center; }
    .tag-count { color: white; font-size: 13px; margin-top: 6px; text-align: center; opacity: 0.9; }
    .refresh-btn { display: block; width: 100%; max-width: 400px; padding: 10px; background: rgba(255,255,255,0.2); color: white; border: 2px solid white; border-radius: 10px; font-size: 14px; cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>

<header>
  <h1>🐴 Kék Ló Zeneterápiás Egyesület</h1>
  <p>Beléptető rendszer</p>
</header>

<div class="card">
  <div id="reader"></div>
</div>

<div class="result" id="result"></div>

<button class="btn" onclick="resetScanner()">🔄 Új beolvasás</button>
<button class="refresh-btn" onclick="loadMembers()">⬇️ Taglista frissítése</button>

<div class="status" id="status">Taglista betöltése...</div>
<div class="tag-count" id="tagCount"></div>

<script>
var members = [];
var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS3ca5xb92mEWwASp4YOmphLEBrayDVuncxlSYlxle_sm_GBV9MlPqs4VsTtCkMVQUrIM6QXQdD_7nR/pub?gid=1708434895&single=true&output=csv";

function loadMembers() {
  document.getElementById('tagCount').textContent = '⏳ Taglista betöltése...';
  fetch(CSV_URL)
    .then(function(r) { return r.text(); })
    .then(function(csv) {
      members = parseCSV(csv);
      var active = members.filter(function(m) { return m.status === 'Elfogadva'; }).length;
      document.getElementById('tagCount').textContent = '✓ ' + active + ' aktív tag betöltve';
      document.getElementById('status').textContent = '📷 Kamera aktív – tartsd a QR kódot a kamera elé';
    })
    .catch(function(err) {
      document.getElementById('tagCount').textContent = '❌ Hiba a betöltésnél';
      document.getElementById('status').textContent = 'Hálózati hiba – ellenőrizd a kapcsolatot';
    });
}

function parseCSV(csv) {
  var lines = csv.split('\n');
  var result = [];
  // Fejléc: A=Időbélyeg, B=Név, C=Lakcím, D=Email, E=Státusz, K=TagID (11. oszlop)
  for (var i = 1; i < lines.length; i++) {
    var cols = lines[i].split(',');
    if (cols.length < 5) continue;
    result.push({
      name:   cols[1] ? cols[1].trim().replace(/"/g, '') : '',
      status: cols[4] ? cols[4].trim().replace(/"/g, '') : '',
      tagId:  cols[10] ? cols[10].trim().replace(/"/g, '') : ''
    });
  }
  return result;
}

function checkMember(tagId) {
  var id = tagId;
  var match = tagId.match(/KLZ-\d{4}-\d+/);
  if (match) id = match[0];
  for (var i = 0; i < members.length; i++) {
    if (members[i].tagId === id) {
      if (members[i].status !== 'Elfogadva') return { ok: false, reason: 'NEM AKTÍV TAG', name: members[i].name };
      return { ok: true, name: members[i].name };
    }
  }
  return { ok: false, reason: 'NEM TALÁLHATÓ', name: '' };
}

var lastScan = '';
var lastScanTime = 0;

function startScanner() {
  var scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    function(decodedText) {
      var now = Date.now();
      if (decodedText === lastScan && now - lastScanTime < 3000) return;
      lastScan = decodedText;
      lastScanTime = now;
      var res = checkMember(decodedText);
      showResult(res);
    },
    function() {}
  );
}
function parseCSV(csv) {
  var lines = csv.split('\n');
  var result = [];
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var cols = [];
    var current = '';
    var inQuotes = false;
    for (var j = 0; j < line.length; j++) {
      if (line[j] === '"') {
        inQuotes = !inQuotes;
      } else if (line[j] === ',' && !inQuotes) {
        cols.push(current.trim());
        current = '';
      } else {
        current += line[j];
      }
    }
    cols.push(current.trim());
    if (cols.length < 5) continue;
    result.push({
      name:   cols[1] || '',
      status: (cols[4] || '').replace(/\r/g, '').trim(),
tagId:  (cols[10] || '').replace(/\r/g, '').trim()
    });
  }
  return result;
}
function showResult(res) {
  var el = document.getElementById('result');
  el.style.display = 'block';
  if (res.ok) {
    el.className = 'result ok';
    el.innerHTML = '✔ BELÉPÉS ENGEDÉLYEZVE<small>' + res.name + '</small>';
  } else {
    el.className = 'result bad';
    el.innerHTML = '❌ BELÉPÉS MEGTAGADVA<small>' + res.reason + (res.name ? ' – ' + res.name : '') + '</small>';
  }
  setTimeout(resetScanner, 4000);
}

function resetScanner() {
  document.getElementById('result').style.display = 'none';
  lastScan = '';
}

loadMembers();
startScanner();
</script>

</body>
</html>
