<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kék Ló – Beléptető</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a4a7a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    header { color: white; text-align: center; margin-bottom: 20px; }
    header h1 { font-size: 22px; }
    header p  { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .card { background: white; border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; margin-bottom: 16px; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; }
    .result { display: none; padding: 20px; border-radius: 10px; text-align: center; font-size: 22px; font-weight: bold; margin-top: 16px; width: 100%; max-width: 400px; }
    .result.ok  { background: #d4edda; color: #155724; }
    .result.bad { background: #f8d7da; color: #721c24; }
    .result small { display: block; font-size: 15px; margin-top: 8px; font-weight: normal; }
    .btn { display: block; width: 100%; max-width: 400px; padding: 14px; background: white; color: #1a4a7a; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; }
    .status { color: white; font-size: 13px; margin-top: 8px; opacity: 0.8; text-align: center; }
    .admin-section { background: white; border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; margin-top: 20px; }
    .admin-section h3 { font-size: 15px; color: #1a4a7a; margin-bottom: 12px; }
    .admin-section textarea { width: 100%; height: 100px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 12px; font-family: monospace; margin-bottom: 8px; }
    .admin-section button { width: 100%; padding: 10px; background: #1a4a7a; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .tag-count { font-size: 12px; color: #666; margin-top: 6px; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>🐴 Kék Ló Zeneterápiás Egyesület</h1>
  <p>Beléptető rendszer</p>
</header>

<div class="card">
  <div id="reader"></div>
</div>

<div class="result" id="result"></div>

<button class="btn" onclick="resetScanner()">🔄 Új beolvasás</button>

<div class="status" id="status">Kamera indítása...</div>

<div class="admin-section">
  <h3>🔧 Taglista frissítése</h3>
  <p style="font-size:12px; color:#666; margin-bottom:8px;">Másold be a taglistát JSON formátumban:</p>
  <textarea id="jsonInput" placeholder='[{"tagId":"KLZ-2026-2","name":"Teszt Elek","status":"Elfogadva"}]'></textarea>
  <button onclick="updateMembers()">💾 Taglista mentése</button>
  <div class="tag-count" id="tagCount"></div>
</div>

<script>
var members = [];

function loadMembers() {
  try {
    var saved = localStorage.getItem('keklo_members');
    if (saved) {
      members = JSON.parse(saved);
      document.getElementById('tagCount').textContent = members.length + ' tag betöltve';
    }
  } catch(e) { members = []; }
}

function updateMembers() {
  try {
    var json = document.getElementById('jsonInput').value.trim();
    var data = JSON.parse(json);
    members = data;
    localStorage.setItem('keklo_members', JSON.stringify(data));
    document.getElementById('tagCount').textContent = data.length + ' tag elmentve ✓';
    document.getElementById('jsonInput').value = '';
  } catch(e) {
    alert('Hibás JSON formátum!');
  }
}

function checkMember(tagId) {
  var id = tagId;
  if (tagId.includes('#')) id = tagId.split('#').pop();
  var match = tagId.match(/KLZ-\d{4}-\d+/);
  if (match) id = match[0];
  for (var i = 0; i < members.length; i++) {
    if (members[i].tagId === id) {
      if (members[i].status !== 'Elfogadva') return { ok: false, reason: 'NEM AKTÍV TAG', name: members[i].name };
      return { ok: true, name: members[i].name };
    }
  }
  return { ok: false, reason: 'NEM TALÁLHATÓ', name: '' };
}

var scanner = null;
var lastScan = '';
var lastScanTime = 0;

function startScanner() {
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess,
    function() {}
  ).then(function() {
    document.getElementById('status').textContent = '📷 Kamera aktív – tartsd a QR kódot a kamera elé';
  }).catch(function(err) {
    document.getElementById('status').textContent = '❌ Kamera hiba: ' + err;
  });
}

function onScanSuccess(decodedText) {
  var now = Date.now();
  if (decodedText === lastScan && now - lastScanTime < 3000) return;
  lastScan = decodedText;
  lastScanTime = now;
  var res = checkMember(decodedText);
  showResult(res);
}

function showResult(res) {
  var el = document.getElementById('result');
  el.style.display = 'block';
  if (res.ok) {
    el.className = 'result ok';
    el.innerHTML = '✔ BELÉPÉS ENGEDÉLYEZVE<small>' + res.name + '</small>';
  } else {
    el.className = 'result bad';
    el.innerHTML = '❌ BELÉPÉS MEGTAGADVA<small>' + res.reason + (res.name ? ' – ' + res.name : '') + '</small>';
  }
  setTimeout(resetScanner, 4000);
}

function resetScanner() {
  document.getElementById('result').style.display = 'none';
  lastScan = '';
}

loadMembers();
startScanner();
</script>

</body>
</html>
